<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCAD Landing Page - Professional Theme</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome to AutoCAD</h1>
        <p>Experience top-notch drafting tools for just ₹99!</p>
    </header>
    <main>
        <h2>Features</h2>
        <ul>
            <li>User-friendly interface</li>
            <li>Advanced drafting tools</li>
            <li>Cloud storage options</li>
        </ul>
        <h2>Get Started</h2>
        <button id="pay-button">Pay Now via Razorpay</button>
    </main>
    <footer>
        <p>&copy; 2026 AutoCAD. All rights reserved.</p>
    </footer>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        document.getElementById('pay-button').onclick = function() {
            var options = {
                "key": "YOUR_RAZORPAY_KEY", // Enter the Key ID generated from the Dashboard
                "amount": "9900", // Amount is in currency subunits. Example: ₹99 = 99 * 100
                "currency": "INR",
                "name": "AutoCAD",
                "description": "Purchase AutoCAD Subscription",
                "image": "https://example.com/your_logo",
                "order_id": "ORDER_ID", // Replace with the order ID generated from your server
                "handler": function (response) {
                    alert("Payment Successful!" + response.razorpay_payment_id);
                },
                "theme": {
                    "color": "#F37254"
                }
            };
            var rzp1 = new Razorpay(options);
            rzp1.open();
            event.preventDefault();
        }
    </script>
</body>
</html>
